<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="hero">
        <h1>Hello, I'm a <span class="highlight">Creative Director</span></h1>
        <p>시선을 사로잡는 숏폼 콘텐츠와 감각적인 비주얼 아트를 만듭니다.</p>
        <a href="https://udmt.aiapp.help/" class="btn" target="_blank">우동맛 홍보 페이지</a>
    </header>

    <main class="bento-grid">
        <div class="bento-item video-card">
            <div class="video-wrapper">
                <img src="https://img.youtube.com/vi/YOUR_VIDEO_ID/maxresdefault.jpg" alt="YouTube Thumbnail">
                <div class="stats-badge" id="yt-stats-1">
                    <i class="fa-solid fa-eye"></i> <span class="views">로딩중...</span>
                    <i class="fa-solid fa-heart"></i> <span class="likes">로딩중...</span>
                </div>
            </div>
            <h3>타이틀 비디오 제목</h3>
        </div>

        <div class="bento-item image-card">
            <img src="전체사이트디자인.png" alt="Infographic Poster">
        </div>
        
        <div class="bento-item image-card">
            <img src="로고.png" alt="Goods Image">
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
